<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Lịch Sử Kiểm Nghiệm - Kiểm Nghiệm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../shared/css/theme.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-4">
            <a
              href="/quality-inspector/index.html"
              class="text-gray-600 hover:text-gray-900"
            >
              <i class="fas fa-arrow-left"></i>
            </a>
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
              >
                <i class="fas fa-history text-white"></i>
              </div>
              <span
                class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
              >
                Lịch Sử Kiểm Nghiệm
              </span>
            </div>
          </div>

          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Inspector"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>

            <div
              x-show="open"
              @click.away="open = false"
              x-transition
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/quality-inspector/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <button
                onclick="Auth.logout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
      <div
        x-data="historyData()"
        x-init="init()"
        class="bg-white rounded-xl shadow-md p-6"
      >
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold flex items-center gap-2">
              <i class="fas fa-clipboard-list text-blue-600"></i>
              Lịch Sử Kiểm Nghiệm
            </h2>
            <p class="text-gray-500 text-sm mt-1">
              Tất cả các lô hàng đã kiểm nghiệm
            </p>
          </div>
          <button @click="loadTests()" class="btn-secondary">
            <i class="fas fa-sync mr-2"></i> Làm mới
          </button>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-6 flex-wrap">
          <button
            @click="filterResult = 'all'"
            :class="filterResult === 'all' ? 'badge-info' : 'badge'"
            class="badge cursor-pointer"
          >
            Tất cả (<span x-text="tests.length"></span>)
          </button>
          <button
            @click="filterResult = 'passed'"
            :class="filterResult === 'passed' ? 'badge-success' : 'badge'"
            class="badge cursor-pointer"
          >
            Đạt (<span x-text="passedCount"></span>)
          </button>
          <button
            @click="filterResult = 'failed'"
            :class="filterResult === 'failed' ? 'badge-error' : 'badge'"
            class="badge cursor-pointer"
          >
            Không đạt (<span x-text="failedCount"></span>)
          </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-blue-50 rounded-lg p-4">
            <p class="text-sm text-blue-600 font-medium">Tổng số test</p>
            <p
              class="text-2xl font-bold text-blue-700"
              x-text="tests.length"
            ></p>
          </div>
          <div class="bg-green-50 rounded-lg p-4">
            <p class="text-sm text-green-600 font-medium">Đạt chuẩn</p>
            <p
              class="text-2xl font-bold text-green-700"
              x-text="passedCount"
            ></p>
          </div>
          <div class="bg-red-50 rounded-lg p-4">
            <p class="text-sm text-red-600 font-medium">Không đạt</p>
            <p class="text-2xl font-bold text-red-700" x-text="failedCount"></p>
          </div>
          <div class="bg-purple-50 rounded-lg p-4">
            <p class="text-sm text-purple-600 font-medium">Tỷ lệ đạt</p>
            <p
              class="text-2xl font-bold text-purple-700"
              x-text="passRate + '%'"
            ></p>
          </div>
        </div>

        <!-- Loading -->
        <div x-show="loading" class="flex justify-center py-12">
          <div class="spinner"></div>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && tests.length === 0" class="text-center py-12">
          <i class="fas fa-vial text-6xl text-gray-300 mb-4"></i>
          <p class="text-gray-500">Chưa có kiểm nghiệm nào</p>
          <a
            href="/quality-inspector/danh-sach-lo-can-kiem.html"
            class="btn-primary inline-block mt-4"
          >
            <i class="fas fa-plus mr-2"></i> Kiểm nghiệm lô đầu tiên
          </a>
        </div>

        <!-- Tests List -->
        <div x-show="!loading && filteredTests.length > 0" class="space-y-4">
          <template x-for="test in filteredTests" :key="test.test_id">
            <div
              class="border border-gray-200 rounded-lg p-6 hover:shadow-lg transition"
            >
              <!-- Header -->
              <div class="flex items-start justify-between mb-4">
                <div class="flex-1">
                  <div class="flex items-center gap-3 mb-2">
                    <h3 class="font-bold text-xl" x-text="test.batch_name"></h3>
                    <span
                      :class="Utils.getTestResultBadge(test.passed)"
                      class="badge text-sm"
                      x-text="Utils.getTestResultText(test.passed)"
                    ></span>
                  </div>

                  <!-- Basic Info -->
                  <div
                    class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm text-gray-600"
                  >
                    <div>
                      <i class="fas fa-hashtag mr-2"></i>
                      Test ID:
                      <span class="font-semibold" x-text="test.test_id"></span>
                    </div>
                    <div>
                      <i class="fas fa-box mr-2"></i>
                      Lô:
                      <span class="font-semibold" x-text="test.batch_id"></span>
                    </div>
                    <div>
                      <i class="fas fa-calendar mr-2"></i>
                      <span
                        x-text="Utils.formatDate(test.test_date_iso)"
                      ></span>
                    </div>
                    <div>
                      <i class="fas fa-user mr-2"></i>
                      <span x-text="test.farmer_name || 'N/A'"></span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Test Details (expandable) -->
              <div x-data="{ expanded: false }">
                <button
                  @click="expanded = !expanded"
                  class="text-sm text-blue-600 hover:text-blue-700 mb-2"
                >
                  <i
                    :class="expanded ? 'fa-chevron-up' : 'fa-chevron-down'"
                    class="fas mr-1"
                  ></i>
                  <span
                    x-text="expanded ? 'Ẩn chi tiết' : 'Xem chi tiết'"
                  ></span>
                </button>

                <div
                  x-show="expanded"
                  x-collapse
                  class="bg-gray-50 rounded-lg p-4 space-y-3"
                >
                  <div x-show="test.test_type">
                    <span class="text-gray-600 font-medium"
                      >Loại kiểm nghiệm:</span
                    >
                    <span class="ml-2" x-text="test.test_type"></span>
                  </div>
                  <div x-show="test.product_name">
                    <span class="text-gray-600 font-medium">Sản phẩm:</span>
                    <span class="ml-2" x-text="test.product_name"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Pagination Info -->
        <div
          x-show="!loading && filteredTests.length > 0"
          class="mt-6 text-center text-sm text-gray-500"
        >
          Hiển thị
          <span class="font-semibold" x-text="filteredTests.length"></span> kết
          quả
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script>
      function historyData() {
        return {
          tests: [],
          loading: true,
          filterResult: "all",

          get passedCount() {
            return this.tests.filter((t) => t.passed).length;
          },

          get failedCount() {
            return this.tests.filter((t) => !t.passed).length;
          },

          get passRate() {
            if (this.tests.length === 0) return 0;
            return Math.round((this.passedCount / this.tests.length) * 100);
          },

          get filteredTests() {
            if (this.filterResult === "all") {
              return this.tests;
            } else if (this.filterResult === "passed") {
              return this.tests.filter((t) => t.passed);
            } else {
              return this.tests.filter((t) => !t.passed);
            }
          },

          async init() {
            const isAuthorized = await Auth.requireQualityInspector();
            if (!isAuthorized) return;
            await this.loadTests();
          },

          async loadTests() {
            this.loading = true;

            try {
              const result = await API.getQualityInspectorMyTests();

              if (result.success) {
                this.tests = result.data.data || [];
                this.tests.sort((a, b) => {
                  const dateA = new Date(a.test_date_iso);
                  const dateB = new Date(b.test_date_iso);
                  return dateB - dateA;
                });
              } else {
                Utils.toast.error(result.error || "Lỗi khi tải lịch sử");
              }
            } catch (error) {
              console.error("Load tests error:", error);
              Utils.toast.error("Lỗi khi tải lịch sử");
            } finally {
              this.loading = false;
            }
          },
        };
      }

      document.addEventListener("DOMContentLoaded", async () => {
        await Auth.init();
      });
    </script>
  </body>
</html>
