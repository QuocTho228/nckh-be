<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Ghi Nhận Kiểm Nghiệm - Kiểm Nghiệm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../shared/css/theme.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-4">
            <a
              href="/quality-inspector/danh-sach-lo-can-kiem.html"
              class="text-gray-600 hover:text-gray-900"
            >
              <i class="fas fa-arrow-left"></i>
            </a>
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
              >
                <i class="fas fa-flask text-white"></i>
              </div>
              <span
                class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
              >
                Ghi Nhận Kiểm Nghiệm
              </span>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
      <div x-data="testFormData()" x-init="init()" class="max-w-4xl mx-auto">
        <!-- Batch Info Card -->
        <div
          x-show="!loadingBatch && batchInfo"
          class="bg-white rounded-xl shadow-md p-6 mb-6"
        >
          <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
            <i class="fas fa-info-circle text-blue-600"></i>
            Thông Tin Lô Hàng
          </h3>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm">
            <div>
              <span class="text-gray-500">Mã lô:</span>
              <span class="font-medium ml-2" x-text="batchInfo.batch_id"></span>
            </div>
            <div>
              <span class="text-gray-500">Tên lô:</span>
              <span
                class="font-medium ml-2"
                x-text="batchInfo.batch_name"
              ></span>
            </div>
            <div>
              <span class="text-gray-500">Nông dân:</span>
              <span
                class="font-medium ml-2"
                x-text="batchInfo.farmer_name"
              ></span>
            </div>
            <div>
              <span class="text-gray-500">Sản phẩm:</span>
              <span
                class="font-medium ml-2"
                x-text="batchInfo.product_name"
              ></span>
            </div>
            <div>
              <span class="text-gray-500">Khối lượng:</span>
              <span
                class="font-medium ml-2"
                x-text="batchInfo.output_weight + ' kg'"
              ></span>
            </div>
            <div>
              <span class="text-gray-500">Phương pháp:</span>
              <span
                class="font-medium ml-2"
                x-text="Utils.getProcessingMethodText(batchInfo.method)"
              ></span>
            </div>
          </div>
        </div>

        <!-- Test Form -->
        <div class="bg-white rounded-xl shadow-md p-6">
          <h3 class="font-bold text-lg mb-6 flex items-center gap-2">
            <i class="fas fa-clipboard-check text-green-600"></i>
            Kết Quả Kiểm Nghiệm
          </h3>

          <form @submit.prevent="submitTest" class="space-y-6">
            <!-- Test Result -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Kết quả kiểm nghiệm <span class="text-red-500">*</span>
              </label>
              <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="radio"
                    x-model="formData.passed"
                    value="true"
                    class="w-4 h-4"
                    required
                  />
                  <span class="text-green-600 font-medium">✓ ĐẠT</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="radio"
                    x-model="formData.passed"
                    value="false"
                    class="w-4 h-4"
                    required
                  />
                  <span class="text-red-600 font-medium">✗ KHÔNG ĐẠT</span>
                </label>
              </div>
            </div>

            <!-- Test Type -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Loại kiểm nghiệm
              </label>
              <select x-model="formData.testType" class="input-gradient">
                <option value="">-- Chọn loại kiểm nghiệm --</option>
                <option value="Kiểm tra cảm quan">Kiểm tra cảm quan</option>
                <option value="Phân tích hóa học">Phân tích hóa học</option>
                <option value="Vi sinh vật">Vi sinh vật</option>
                <option value="Tính chất vật lý">Tính chất vật lý</option>
                <option value="Dư lượng thuốc BVTV">Dư lượng thuốc BVTV</option>
                <option value="Kim loại nặng">Kim loại nặng</option>
              </select>
            </div>

            <!-- Test Method -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Phương pháp thử nghiệm
              </label>
              <input
                type="text"
                x-model="formData.testMethod"
                placeholder="VD: TCVN 12345:2020"
                class="input-gradient"
              />
            </div>

            <!-- Result Details -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Chi tiết kết quả
              </label>
              <textarea
                x-model="formData.result"
                rows="3"
                placeholder="Mô tả chi tiết kết quả kiểm nghiệm..."
                class="input-gradient"
              ></textarea>
            </div>

            <!-- Standard -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Tiêu chuẩn áp dụng
              </label>
              <input
                type="text"
                x-model="formData.standard"
                placeholder="VD: TCVN 8086:2009"
                class="input-gradient"
              />
            </div>

            <!-- Notes -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Ghi chú
              </label>
              <textarea
                x-model="formData.notes"
                rows="3"
                placeholder="Ghi chú thêm..."
                class="input-gradient"
              ></textarea>
            </div>

            <!-- Test Images -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Ảnh minh chứng
              </label>
              <input
                type="file"
                @change="handleFileSelect"
                multiple
                accept="image/*"
                class="input-gradient"
              />
              <p class="text-sm text-gray-500 mt-1">
                Tối đa 10 ảnh, mỗi ảnh không quá 10MB
              </p>

              <!-- Image Preview -->
              <div
                x-show="previewImages.length > 0"
                class="grid grid-cols-3 gap-4 mt-4"
              >
                <template x-for="(img, index) in previewImages" :key="index">
                  <div class="relative">
                    <img
                      :src="img"
                      class="w-full h-32 object-cover rounded-lg"
                    />
                    <button
                      type="button"
                      @click="removeImage(index)"
                      class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-red-600"
                    >
                      <i class="fas fa-times text-xs"></i>
                    </button>
                  </div>
                </template>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="flex gap-4">
              <button
                type="submit"
                :disabled="submitting"
                class="btn-primary flex-1"
              >
                <i class="fas fa-save mr-2"></i>
                <span
                  x-text="submitting ? 'Đang xử lý...' : 'Ghi nhận kết quả'"
                ></span>
              </button>
              <a
                href="/quality-inspector/danh-sach-lo-can-kiem.html"
                class="btn-secondary"
              >
                <i class="fas fa-times mr-2"></i> Hủy
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="js/test-form.js"></script>
  </body>
</html>
