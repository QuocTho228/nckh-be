<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Danh Sách Lô Cần Vận Chuyển</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../shared/css/theme.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
            >
              <i class="fas fa-truck text-white"></i>
            </div>
            <span
              class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
              >Vận Chuyển</span
            >
          </div>
          <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
            <a href="/transporter/index.html" class="hover:text-green-600">
              <i class="fas fa-home"></i> Dashboard
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-semibold">Lô cần vận chuyển</span>
          </div>
          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Transporter&background=028040&color=fff"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <div class="text-left hidden md:block">
                <div id="userName" class="font-semibold text-sm">
                  Vận chuyển viên
                </div>
                <div id="userEmail" class="text-xs text-gray-500"></div>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>
            <div
              x-show="open"
              @click.away="open = false"
              x-transition
              x-cloak
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/transporter/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <a
                href="/tieu-dung/trangcanhan.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-user mr-2"></i> Trang cá nhân
              </a>
              <button
                onclick="Auth.logout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div
      class="container mx-auto px-4 py-8"
      x-data="transportList()"
      x-init="init()"
    >
      <div class="mb-8">
        <h1
          class="text-3xl font-bold text-gray-900 mb-2 flex items-center gap-3"
        >
          <i class="fas fa-boxes text-orange-600"></i> Lô Hàng Cần Vận Chuyển
        </h1>
        <p class="text-gray-600">Quản lý lô hàng cần vận chuyển</p>
      </div>

      <!-- Filter Tabs -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <div class="flex flex-wrap gap-3">
          <button
            @click="filterType = 'all'"
            :class="filterType === 'all' ? 'btn-primary' : 'btn-secondary'"
          >
            <i class="fas fa-list mr-2"></i> Tất cả
            <span
              x-show="filterType === 'all'"
              x-text="`(${filteredBatches.length})`"
              class="ml-1"
            ></span>
          </button>
          <button
            @click="filterType = 'notstarted'"
            :class="filterType === 'notstarted' ? 'btn-primary' : 'btn-secondary'"
          >
            <i class="fas fa-hourglass-start mr-2"></i> Chưa bắt đầu
          </button>
          <button
            @click="filterType = 'intransit'"
            :class="filterType === 'intransit' ? 'btn-primary' : 'btn-secondary'"
          >
            <i class="fas fa-shipping-fast mr-2"></i> Đang vận chuyển
          </button>
          <button
            @click="filterType = 'completed'"
            :class="filterType === 'completed' ? 'btn-primary' : 'btn-secondary'"
          >
            <i class="fas fa-check-circle mr-2"></i> Đã hoàn thành
          </button>
          <button @click="loadBatches()" class="btn-secondary ml-auto">
            <i class="fas fa-sync mr-2"></i> Làm mới
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <input
          type="text"
          x-model="searchQuery"
          placeholder="Tìm kiếm theo tên lô, SSCC, nông dân..."
          class="input-gradient"
        />
      </div>

      <!-- Loading -->
      <div x-show="loading" x-cloak class="flex justify-center py-12">
        <div class="spinner"></div>
      </div>

      <!-- Empty State -->
      <div
        x-show="!loading && filteredBatches.length === 0"
        x-cloak
        class="text-center py-12"
      >
        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-500">Không có lô hàng nào cần vận chuyển</p>
      </div>

      <!-- Batches Grid -->
      <div
        x-show="!loading && filteredBatches.length > 0"
        x-cloak
        class="grid grid-cols-1 gap-6"
      >
        <template x-for="batch in filteredBatches" :key="batch.batch_id">
          <div
            class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition"
          >
            <div class="flex items-start justify-between mb-4">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                  <h3 class="text-xl font-bold" x-text="batch.batch_name"></h3>

                  <!-- Badge vận chuyển lần 1/2 -->
                  <span
                    x-show="batch.detailed_transport_status !== 'Delivered'"
                    :class="batch.current_stage === 'Purchased' ? 'badge-warning' : 'badge-info'"
                    class="badge"
                  >
                    <span
                      x-text="batch.current_stage === 'Purchased' ? 'Vận chuyển lần 1' : 'Vận chuyển lần 2'"
                    ></span>
                  </span>

                  <!-- Badge đã hoàn thành -->
                  <span
                    x-show="batch.detailed_transport_status === 'Delivered'"
                    class="badge badge-success"
                  >
                    <i class="fas fa-check-circle mr-1"></i> Đã hoàn thành vận
                    chuyển
                  </span>

                  <!-- Badge đang vận chuyển -->
                  <span
                    x-show="batch.transport_status === 'InTransit' && batch.detailed_transport_status !== 'Delivered'"
                    class="badge badge-warning"
                  >
                    <i class="fas fa-truck mr-1"></i> Đang vận chuyển
                  </span>
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                  <div>
                    <i class="fas fa-barcode mr-2"></i
                    ><span x-text="batch.sscc"></span>
                  </div>
                  <div>
                    <i class="fas fa-calendar mr-2"></i
                    ><span
                      x-text="Utils.formatDate(batch.production_date_iso)"
                    ></span>
                  </div>
                </div>
                <div class="mt-2 text-sm">
                  <i class="fas fa-route mr-2 text-blue-600"></i>
                  <span
                    class="font-semibold"
                    x-text="batch.current_stage === 'Purchased' ? 'Từ nơi thu mua → Nhà máy sản xuất' : 'Từ nhà máy → Kho bãi'"
                  ></span>
                </div>
              </div>

              <!-- Nút hành động -->
              <div>
                <!-- Nút Vận chuyển (khi chưa hoàn thành) -->
                <a
                  x-show="batch.detailed_transport_status !== 'Delivered'"
                  :href="`/transporter/cap-nhat-trang-thai.html?id=${batch.batch_id}`"
                  class="btn-primary"
                >
                  <i class="fas fa-truck mr-2"></i> Vận chuyển
                </a>

                <!-- Nút Xem chi tiết (khi đã hoàn thành) -->
                <a
                  x-show="batch.detailed_transport_status === 'Delivered'"
                  :href="`/transporter/cap-nhat-trang-thai.html?id=${batch.batch_id}`"
                  class="btn-secondary"
                >
                  <i class="fas fa-eye mr-2"></i> Xem chi tiết
                </a>
              </div>
            </div>

            <!-- Info Grid -->
            <div
              class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 bg-gray-50 rounded-lg"
            >
              <div>
                <p class="text-xs text-gray-500 mb-1">Nông dân</p>
                <p
                  class="font-semibold"
                  x-text="batch.farmer_name || 'N/A'"
                ></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Sản phẩm</p>
                <p
                  class="font-semibold"
                  x-text="batch.product_name || 'N/A'"
                ></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Số lượng</p>
                <p class="font-semibold" x-text="batch.quantity + ' kg'"></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Thu mua bởi</p>
                <p
                  class="font-semibold"
                  x-text="batch.purchaser_name || 'N/A'"
                ></p>
              </div>
            </div>

            <div class="mt-4 pt-4 border-t flex items-center justify-between">
              <div class="text-sm text-gray-600">
                <i class="fas fa-phone mr-2"></i
                ><span x-text="batch.farmer_phone || 'N/A'"></span>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Pagination -->
      <div
        x-show="!loading && filteredBatches.length > 0"
        x-cloak
        class="mt-8 text-center text-gray-600"
      >
        Hiển thị <strong x-text="filteredBatches.length"></strong> lô hàng
      </div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="js/transport-list.js"></script>
  </body>
</html>
