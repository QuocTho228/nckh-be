<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Đăng Nhập</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <style>
      body {
        background: linear-gradient(to bottom, #f8f9fa 0%, #e9ecef 100%);
        min-height: 100vh;
        height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      /* Animated background icons */
      .blockchain-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
      }

      .blockchain-icon {
        position: absolute;
        font-size: 40px;
        opacity: 0.08;
        color: #7fae2a;
        animation: float 20s infinite ease-in-out;
      }

      .blockchain-icon:nth-child(1) {
        top: 10%;
        left: 10%;
        animation-delay: 0s;
        animation-duration: 25s;
      }

      .blockchain-icon:nth-child(2) {
        top: 70%;
        left: 80%;
        animation-delay: 3s;
        animation-duration: 22s;
      }

      .blockchain-icon:nth-child(3) {
        top: 30%;
        left: 75%;
        animation-delay: 1s;
        animation-duration: 28s;
      }

      .blockchain-icon:nth-child(4) {
        top: 80%;
        left: 20%;
        animation-delay: 5s;
        animation-duration: 24s;
      }

      .blockchain-icon:nth-child(5) {
        top: 20%;
        left: 50%;
        animation-delay: 2s;
        animation-duration: 26s;
      }

      .blockchain-icon:nth-child(6) {
        top: 60%;
        left: 45%;
        animation-delay: 4s;
        animation-duration: 23s;
      }

      .blockchain-icon:nth-child(7) {
        top: 15%;
        left: 85%;
        animation-delay: 6s;
        animation-duration: 27s;
      }

      .blockchain-icon:nth-child(8) {
        top: 45%;
        left: 15%;
        animation-delay: 7s;
        animation-duration: 21s;
      }

      .blockchain-icon:nth-child(9) {
        top: 85%;
        left: 60%;
        animation-delay: 8s;
        animation-duration: 29s;
      }

      .blockchain-icon:nth-child(10) {
        top: 50%;
        left: 90%;
        animation-delay: 3.5s;
        animation-duration: 24s;
      }

      .blockchain-icon:nth-child(11) {
        top: 25%;
        left: 30%;
        animation-delay: 5.5s;
        animation-duration: 26s;
      }

      .blockchain-icon:nth-child(12) {
        top: 75%;
        left: 70%;
        animation-delay: 2.5s;
        animation-duration: 25s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) translateX(0) rotate(0deg);
        }
        25% {
          transform: translateY(-30px) translateX(20px) rotate(5deg);
        }
        50% {
          transform: translateY(-60px) translateX(-20px) rotate(-5deg);
        }
        75% {
          transform: translateY(-30px) translateX(20px) rotate(3deg);
        }
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
        margin-top: 80px;
        background-color: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 2px solid rgba(127, 174, 42, 0.2);
        animation: fadeIn 0.5s ease-out;
        position: relative;
        z-index: 1;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        color: #22b500;
        font-size: 32px;
        margin-bottom: 35px;
        font-weight: 800;
        text-align: center;
        text-shadow: 2px 2px 4px rgba(127, 174, 42, 0.1);
      }

      .form-group {
        margin-bottom: 25px;
        position: relative;
      }

      .form-group label {
        font-size: 15px;
        color: #2d3436;
        margin-bottom: 10px;
        font-weight: 600;
        display: block;
      }

      .form-control {
        height: 50px;
        padding: 12px 18px;
        border: 2.5px solid #e0e0e0;
        border-radius: 12px;
        transition: all 0.3s ease;
        font-size: 15px;
        background-color: #ffffff;
        color: #2d3436;
      }

      .form-control:focus {
        border-color: #7fae2a;
        box-shadow: 0 0 0 0.25rem rgba(127, 174, 42, 0.25);
        outline: none;
      }

      .form-control::placeholder {
        color: #95a5a6;
      }

      .btn-primary {
        height: 52px;
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: 0.8px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(34, 181, 0, 0.5);
        background: linear-gradient(135deg, #22b500 0%, #7fae2a 100%);
      }

      .btn-primary:active {
        transform: translateY(-1px);
      }

      .form-check {
        margin: 20px 0;
        padding-left: 1.8rem;
      }

      .form-check-label {
        color: #2d3436;
        font-size: 14.5px;
        font-weight: 500;
      }

      .form-check-input {
        margin-top: 0.25rem;
        width: 1.2em;
        height: 1.2em;
        margin-left: -1.5rem !important;
      }

      .form-check-input:checked {
        background-color: #7fae2a;
        border-color: #7fae2a;
      }

      .dangky,
      .quenmk {
        text-align: center;
        margin-top: 25px;
      }

      .dangky p,
      .quenmk p {
        color: #2d3436;
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 5px;
      }

      .dangky a,
      .quenmk a {
        color: #22b500;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
        position: relative;
      }

      .dangky a:hover,
      .quenmk a:hover {
        color: #7fae2a;
        text-decoration: none;
      }

      .dangky a::after,
      .quenmk a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 50%;
        background-color: #7fae2a;
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }

      .dangky a:hover::after,
      .quenmk a:hover::after {
        width: 100%;
      }

      /* Style cho nút quay lại */
      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
      }

      .back-button .btn {
        background-color: rgba(255, 255, 255, 0.95);
        border: 2.5px solid #7fae2a;
        color: #22b500;
        padding: 10px 20px;
        font-size: 15px;
        border-radius: 25px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        box-shadow: 0 4px 15px rgba(127, 174, 42, 0.2);
      }

      .back-button .btn:hover {
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        color: white;
        transform: translateX(-5px);
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.4);
      }

      .back-button i {
        transition: transform 0.3s ease;
      }

      .back-button .btn:hover i {
        transform: translateX(-3px);
      }

      /* Custom styles cho toast */
      .toastify {
        padding: 14px 24px;
        color: #ffffff;
        font-size: 15px;
        border-radius: 10px;
        max-width: 350px;
        font-weight: 600;
      }

      .toast-success {
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.4);
      }

      .toast-error {
        background: linear-gradient(to right, #e74c3c, #c0392b);
        box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
      }

      /* Responsive */
      @media (max-width: 576px) {
        .container {
          margin-top: 80px;
          padding: 25px;
          margin-left: 15px;
          margin-right: 15px;
        }

        h1 {
          font-size: 26px;
          margin-top: 20px;
        }

        .back-button {
          position: fixed;
          top: 15px;
          left: 15px;
        }

        .back-button .btn {
          padding: 8px 16px;
          font-size: 14px;
        }

        .form-group {
          margin-bottom: 18px;
        }

        .dangky,
        .quenmk {
          margin-top: 18px;
          font-size: 14px;
        }
      }

      @media (max-width: 320px) {
        .container {
          margin-top: 60px;
          padding: 20px;
        }

        h1 {
          font-size: 24px;
        }

        .back-button .btn {
          padding: 6px 12px;
          font-size: 13px;
        }
      }

      /* Animation cho focus input */
      @keyframes inputFocus {
        0% {
          box-shadow: 0 0 0 0 rgba(127, 174, 42, 0.4);
        }
        100% {
          box-shadow: 0 0 0 0.25rem rgba(127, 174, 42, 0.25);
        }
      }

      .form-control:focus {
        animation: inputFocus 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <!-- Blockchain animated background -->
    <div class="blockchain-bg">
      <i class="fas fa-cubes blockchain-icon"></i>
      <i class="fas fa-network-wired blockchain-icon"></i>
      <i class="fas fa-link blockchain-icon"></i>
      <i class="fas fa-shield-alt blockchain-icon"></i>
      <i class="fas fa-lock blockchain-icon"></i>
      <i class="fas fa-database blockchain-icon"></i>
      <i class="fas fa-server blockchain-icon"></i>
      <i class="fas fa-code-branch blockchain-icon"></i>
      <i class="fas fa-sitemap blockchain-icon"></i>
      <i class="fas fa-fingerprint blockchain-icon"></i>
      <i class="fas fa-project-diagram blockchain-icon"></i>
      <i class="fas fa-layer-group blockchain-icon"></i>
    </div>

    <!-- Nút quay lại -->
    <div class="back-button">
      <a href="/" class="btn">
        <i class="fas fa-arrow-left"></i>
        Trang chủ
      </a>
    </div>

    <div class="container">
      <h1>Đăng Nhập</h1>
      <form id="loginForm" class="mt-4">
        <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            required
            placeholder="Nhập địa chỉ email"
          />
        </div>
        <div class="form-group">
          <label for="password">Mật Khẩu:</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            required
            placeholder="Nhập mật khẩu"
          />
        </div>
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="adminCheck" />
          <label class="form-check-label" for="adminCheck"
            >Đăng nhập với tư cách Admin</label
          >
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          Đăng Nhập
        </button>
      </form>

      <div class="dangky">
        <p>
          Chưa có tài khoản? <a href="/account/dangky.html">Đăng ký ngay</a>
        </p>
      </div>
      <div class="quenmk">
        <p><a href="/account/quenmatkhau.html">Quên mật khẩu?</a></p>
      </div>
    </div>

    <!-- Bootstrap JS và các thư viện phụ thuộc -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const isAdmin = document.getElementById("adminCheck").checked;

          try {
            const response = await fetch("/api/dangnhap", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              credentials: "include",
              body: JSON.stringify({ email, password, isAdmin }),
            });

            const data = await response.json();
            console.log("Phản hồi đăng nhập:", data);

            if (response.ok) {
              Toastify({
                text: "Đăng nhập thành công!",
                duration: 2000,
                gravity: "top",
                position: "right",
                className: "toast-success",
                close: true,
              }).showToast();

              setTimeout(() => {
                if (data.admin) {
                  window.location.href = "../admin/admintest.html";
                } else if (data.user) {
                  switch (data.user.roleId) {
                    case 1:
                      // window.location.href = "../san-xuat/sanxuat.html";
                      window.location.href = "../farmer/index.html";
                      break;
                    case 2:
                      // window.location.href = "../kiem-duyet/nhakiemduyet.html";
                      window.location.href = "../inspector/index.html";
                      break;
                    case 3:
                      window.location.href = "../purchaser/index.html";
                      break;
                    case 6:
                      // window.location.href = "../van-chuyen/van-chuyen.html";
                      window.location.href = "../transporter/index.html";
                      break;
                    case 8:
                      window.location.href = "../nha-kho/nha-kho.html";
                      break;
                    default:
                      Toastify({
                        text: "Không có trang phù hợp cho vai trò của bạn",
                        duration: 3000,
                        gravity: "top",
                        position: "right",
                        className: "toast-error",
                        close: true,
                      }).showToast();
                  }
                }
              }, 2000);
            } else {
              Toastify({
                text: data.message || "Đăng nhập thất bại",
                duration: 3000,
                gravity: "top",
                position: "right",
                className: "toast-error",
                close: true,
              }).showToast();
            }
          } catch (error) {
            console.error("Lỗi khi đăng nhập:", error);
            Toastify({
              text: "Đã xảy ra lỗi khi đăng nhập",
              duration: 3000,
              gravity: "top",
              position: "right",
              className: "toast-error",
              close: true,
            }).showToast();
          }
        });
    </script>
  </body>
</html>
