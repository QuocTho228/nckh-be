<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Đăng Ký Người Dùng</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <style>
      body {
        background: linear-gradient(to bottom, #f8f9fa 0%, #e9ecef 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }

      /* Animated background icons */
      .blockchain-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
      }

      .blockchain-icon {
        position: absolute;
        font-size: 40px;
        opacity: 0.08;
        color: #7fae2a;
        animation: float 20s infinite ease-in-out;
      }

      .blockchain-icon:nth-child(1) {
        top: 10%;
        left: 10%;
        animation-delay: 0s;
        animation-duration: 25s;
      }

      .blockchain-icon:nth-child(2) {
        top: 70%;
        left: 80%;
        animation-delay: 3s;
        animation-duration: 22s;
      }

      .blockchain-icon:nth-child(3) {
        top: 30%;
        left: 75%;
        animation-delay: 1s;
        animation-duration: 28s;
      }

      .blockchain-icon:nth-child(4) {
        top: 80%;
        left: 20%;
        animation-delay: 5s;
        animation-duration: 24s;
      }

      .blockchain-icon:nth-child(5) {
        top: 20%;
        left: 50%;
        animation-delay: 2s;
        animation-duration: 26s;
      }

      .blockchain-icon:nth-child(6) {
        top: 60%;
        left: 45%;
        animation-delay: 4s;
        animation-duration: 23s;
      }

      .blockchain-icon:nth-child(7) {
        top: 15%;
        left: 85%;
        animation-delay: 6s;
        animation-duration: 27s;
      }

      .blockchain-icon:nth-child(8) {
        top: 45%;
        left: 15%;
        animation-delay: 7s;
        animation-duration: 21s;
      }

      .blockchain-icon:nth-child(9) {
        top: 85%;
        left: 60%;
        animation-delay: 8s;
        animation-duration: 29s;
      }

      .blockchain-icon:nth-child(10) {
        top: 50%;
        left: 90%;
        animation-delay: 3.5s;
        animation-duration: 24s;
      }

      .blockchain-icon:nth-child(11) {
        top: 25%;
        left: 30%;
        animation-delay: 5.5s;
        animation-duration: 26s;
      }

      .blockchain-icon:nth-child(12) {
        top: 75%;
        left: 70%;
        animation-delay: 2.5s;
        animation-duration: 25s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) translateX(0) rotate(0deg);
        }
        25% {
          transform: translateY(-30px) translateX(20px) rotate(5deg);
        }
        50% {
          transform: translateY(-60px) translateX(-20px) rotate(-5deg);
        }
        75% {
          transform: translateY(-30px) translateX(20px) rotate(3deg);
        }
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        margin-top: 80px;
        margin-bottom: 40px;
        background-color: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 2px solid rgba(127, 174, 42, 0.2);
        animation: fadeIn 0.5s ease-out;
        position: relative;
        z-index: 1;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        color: #22b500;
        font-size: 32px;
        margin-bottom: 35px;
        font-weight: 800;
        text-align: center;
        text-shadow: 2px 2px 4px rgba(127, 174, 42, 0.1);
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-group label {
        font-size: 15px;
        color: #2d3436;
        margin-bottom: 10px;
        font-weight: 600;
        display: block;
      }

      .form-control {
        height: 50px;
        padding: 12px 18px;
        border: 2.5px solid #e0e0e0;
        border-radius: 12px;
        transition: all 0.3s ease;
        font-size: 15px;
        background-color: #ffffff;
        color: #2d3436;
      }

      .form-control:focus {
        border-color: #7fae2a;
        box-shadow: 0 0 0 0.25rem rgba(127, 174, 42, 0.25);
        outline: none;
      }

      .form-control::placeholder {
        color: #95a5a6;
      }

      .form-control:disabled {
        background-color: #f5f5f5 !important;
        color: #999 !important;
        opacity: 0.7 !important;
        cursor: not-allowed !important;
      }

      .btn-primary {
        height: 52px;
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: 0.8px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.3);
        margin-top: 10px;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(34, 181, 0, 0.5);
        background: linear-gradient(135deg, #22b500 0%, #7fae2a 100%);
      }

      .btn-primary:active {
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
      }

      .back-button .btn {
        background-color: rgba(255, 255, 255, 0.95);
        border: 2.5px solid #7fae2a;
        color: #22b500;
        padding: 10px 20px;
        font-size: 15px;
        border-radius: 25px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        box-shadow: 0 4px 15px rgba(127, 174, 42, 0.2);
      }

      .back-button .btn:hover {
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        color: white;
        transform: translateX(-5px);
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.4);
      }

      .back-button i {
        transition: transform 0.3s ease;
      }

      .back-button .btn:hover i {
        transform: translateX(-3px);
      }

      .dangnhap {
        text-align: center;
        margin-top: 25px;
      }

      .dangnhap p {
        color: #2d3436;
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 5px;
      }

      .dangnhap a {
        color: #22b500;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
        position: relative;
      }

      .dangnhap a:hover {
        color: #7fae2a;
        text-decoration: none;
      }

      .dangnhap a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 50%;
        background-color: #7fae2a;
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }

      .dangnhap a:hover::after {
        width: 100%;
      }

      .anncounce {
        text-align: center;
        color: #c0392b;
        padding: 12px;
        margin-bottom: 25px;
        font-weight: 600;
        font-size: 15px;
        background-color: rgba(192, 57, 43, 0.15);
        border-radius: 10px;
        animation: pulse 2s infinite;
        border: 2px solid rgba(192, 57, 43, 0.3);
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
        100% {
          transform: scale(1);
        }
      }

      .toastify {
        padding: 14px 24px;
        color: #ffffff;
        font-size: 15px;
        border-radius: 10px;
        max-width: 350px;
        font-weight: 600;
      }

      .toast-success {
        background: linear-gradient(135deg, #7fae2a 0%, #22b500 100%);
        box-shadow: 0 6px 20px rgba(34, 181, 0, 0.4);
      }

      .toast-error {
        background: linear-gradient(to right, #e74c3c, #c0392b);
        box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
      }

      @media (max-width: 576px) {
        .container {
          margin-top: 80px;
          padding: 25px;
          margin-left: 15px;
          margin-right: 15px;
        }

        h1 {
          font-size: 26px;
          margin-top: 20px;
        }

        .back-button {
          position: fixed;
          top: 15px;
          left: 15px;
        }

        .back-button .btn {
          padding: 8px 16px;
          font-size: 14px;
        }

        .form-group {
          margin-bottom: 15px;
        }
      }

      @media (max-width: 320px) {
        .container {
          margin-top: 60px;
          padding: 20px;
        }

        h1 {
          font-size: 24px;
        }

        .back-button .btn {
          padding: 6px 12px;
          font-size: 13px;
        }
      }

      @keyframes inputFocus {
        0% {
          box-shadow: 0 0 0 0 rgba(127, 174, 42, 0.4);
        }
        100% {
          box-shadow: 0 0 0 0.25rem rgba(127, 174, 42, 0.25);
        }
      }

      .form-control:focus {
        animation: inputFocus 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <!-- Blockchain animated background -->
    <div class="blockchain-bg">
      <i class="fas fa-cubes blockchain-icon"></i>
      <i class="fas fa-network-wired blockchain-icon"></i>
      <i class="fas fa-link blockchain-icon"></i>
      <i class="fas fa-shield-alt blockchain-icon"></i>
      <i class="fas fa-lock blockchain-icon"></i>
      <i class="fas fa-database blockchain-icon"></i>
      <i class="fas fa-server blockchain-icon"></i>
      <i class="fas fa-code-branch blockchain-icon"></i>
      <i class="fas fa-sitemap blockchain-icon"></i>
      <i class="fas fa-fingerprint blockchain-icon"></i>
      <i class="fas fa-project-diagram blockchain-icon"></i>
      <i class="fas fa-layer-group blockchain-icon"></i>
    </div>

    <!-- Nút quay lại -->
    <div class="back-button">
      <a href="/" class="btn">
        <i class="fas fa-arrow-left"></i>
        Trang chủ
      </a>
    </div>

    <div class="container">
      <h1>Đăng Ký</h1>
      <form id="registrationForm" class="mt-4" enctype="multipart/form-data">
        <div id="roleAnnounce" class="anncounce">
          Hãy chọn vai trò bên dưới trước để nhập thông tin nhé!
        </div>

        <!-- Vai trò - Di chuyển lên đầu -->
        <div class="form-group">
          <label for="role">Vai Trò:</label>
          <select class="form-control" id="role" name="role_id" required>
            <option value="">Chọn vai trò</option>
            <option value="1">Người Sản Xuất</option>
            <option value="2">Người Kiểm Duyệt</option>
            <option value="6">Người Vận Chuyển</option>
            <option value="8">Nhà Kho</option>
          </select>
        </div>

        <div class="form-group">
          <label for="name" id="nameLabel">Họ và Tên:</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Nhập họ và tên"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Nhập địa chỉ email"
            required
          />
        </div>

        <div class="form-group">
          <label for="avatar">Ảnh Đại Diện:</label>
          <input
            type="file"
            class="form-control"
            id="avatar"
            name="avatar"
            accept="image/*"
          />
        </div>

        <div class="form-group">
          <label for="password">Mật Khẩu:</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Nhập mật khẩu"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác Nhận Mật Khẩu:</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Nhập lại mật khẩu"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label for="phone">Số Điện Thoại:</label>
          <input
            type="text"
            class="form-control"
            id="phone"
            name="phone"
            placeholder="Nhập số điện thoại"
            required
          />
        </div>

        <div class="form-group">
          <label for="province">Tỉnh/Thành phố:</label>
          <select
            class="form-control"
            id="province"
            name="province_id"
            required
          >
            <option value="">Chọn Tỉnh/Thành phố</option>
          </select>
        </div>

        <div class="form-group">
          <label for="district">Quận/Huyện:</label>
          <select
            class="form-control"
            id="district"
            name="district_id"
            required
            disabled
          >
            <option value="">Chọn Quận/Huyện</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ward">Xã/Phường:</label>
          <select
            class="form-control"
            id="ward"
            name="ward_id"
            required
            disabled
          >
            <option value="">Chọn Xã/Phường</option>
          </select>
        </div>

        <div class="form-group">
          <label for="specific_address">Địa chỉ cụ thể:</label>
          <input
            type="text"
            class="form-control"
            id="specific_address"
            name="specific_address"
            placeholder="Số nhà, tên đường..."
          />
        </div>

        <div class="form-group">
          <label for="full_address">Địa chỉ đầy đủ:</label>
          <input
            type="text"
            class="form-control"
            id="full_address"
            name="address"
            placeholder="Địa chỉ sẽ được tạo tự động"
            readonly
          />
        </div>

        <div class="form-group">
          <label for="dob">Ngày Sinh:</label>
          <input
            type="date"
            class="form-control"
            id="dob"
            name="dob"
            required
          />
        </div>

        <div class="form-group">
          <label for="gender">Giới Tính:</label>
          <select class="form-control" id="gender" name="gender" required>
            <option value="">Chọn giới tính</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
          </select>
        </div>

        <div class="form-group" id="regionGroup" style="display: none">
          <label for="region_id">Vùng sản xuất:</label>
          <select class="form-control" id="region_id" name="region_id">
            <option value="">Chọn vùng sản xuất</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Đăng Ký</button>
      </form>

      <div class="dangnhap">
        <p>
          Đã có tài khoản? <a href="/account/dangnhap.html">Đăng nhập ngay</a>
        </p>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>

    <script>
      // Load regions - will be loaded dynamically when province is selected
      async function loadRegionsByProvince(provinceId) {
        const regionSelect = document.getElementById("region_id");
        regionSelect.innerHTML = '<option value="">Chọn vùng sản xuất</option>';

        if (!provinceId) return;

        try {
          const response = await fetch(
            `/api/regions?province_id=${provinceId}`
          );
          if (!response.ok) {
            console.warn("Không thể lấy danh sách vùng sản xuất");
            return;
          }
          const regions = await response.json();
          regions.forEach((region) => {
            const option = document.createElement("option");
            option.value = region.region_id;
            option.textContent = region.region_name;
            regionSelect.appendChild(option);
          });
        } catch (error) {
          console.error("Lỗi khi lấy danh sách vùng sản xuất:", error);
        }
      }

      // Role change handler
      document.addEventListener("DOMContentLoaded", function () {
        const roleSelect = document.getElementById("role");
        const regionGroup = document.getElementById("regionGroup");
        const form = document.getElementById("registrationForm");
        const submitButton = form.querySelector('button[type="submit"]');
        const roleAnnounce = document.getElementById("roleAnnounce");
        const nameLabel = document.getElementById("nameLabel");

        function toggleInputs(disabled) {
          const inputs = form.querySelectorAll("input, select");
          inputs.forEach((input) => {
            if (input.id !== "role") {
              input.disabled = disabled;
            }
          });
          submitButton.disabled = disabled;
        }

        toggleInputs(true);

        roleSelect.addEventListener("change", function () {
          if (this.value) {
            toggleInputs(false);
            roleAnnounce.style.display = "none";

            // Update name label for warehouse
            if (this.value === "8") {
              nameLabel.textContent = "Tên nhà kho:";
            } else {
              nameLabel.textContent = "Họ và Tên:";
            }

            // Show/hide region based on role
            if (this.value === "1" || this.value === "2") {
              regionGroup.style.display = "block";
              document.getElementById("region_id").required = true;
            } else {
              regionGroup.style.display = "none";
              document.getElementById("region_id").required = false;
              document.getElementById("region_id").value = "";
            }
          } else {
            toggleInputs(true);
            regionGroup.style.display = "none";
            roleAnnounce.style.display = "block";
            nameLabel.textContent = "Họ và Tên:";
          }
        });
      });

      // Province/District/Ward handlers
      document.addEventListener("DOMContentLoaded", function () {
        const provinceSelect = document.getElementById("province");
        const districtSelect = document.getElementById("district");
        const wardSelect = document.getElementById("ward");
        const specificAddressInput =
          document.getElementById("specific_address");
        const fullAddressInput = document.getElementById("full_address");

        fetch("/api/provinces")
          .then((response) => response.json())
          .then((provinces) => {
            provinces.forEach((province) => {
              const option = document.createElement("option");
              option.value = province.id;
              option.textContent = province.name;
              provinceSelect.appendChild(option);
            });
          })
          .catch((error) => console.error("Error fetching provinces:", error));

        provinceSelect.addEventListener("change", function () {
          const selectedProvinceId = this.value;
          districtSelect.innerHTML =
            '<option value="">Chọn Quận/Huyện</option>';
          wardSelect.innerHTML = '<option value="">Chọn Xã/Phường</option>';
          districtSelect.disabled = !selectedProvinceId;
          wardSelect.disabled = true;

          if (selectedProvinceId) {
            // Load districts
            fetch(`/api/districts/${selectedProvinceId}`)
              .then((response) => response.json())
              .then((districts) => {
                districts.forEach((district) => {
                  const option = document.createElement("option");
                  option.value = district.id;
                  option.textContent = district.name;
                  districtSelect.appendChild(option);
                });
              });

            // Load regions for this province (for producer/inspector roles)
            loadRegionsByProvince(selectedProvinceId);
          }
          updateFullAddress();
        });

        districtSelect.addEventListener("change", function () {
          const selectedDistrictId = this.value;
          wardSelect.innerHTML = '<option value="">Chọn Xã/Phường</option>';
          wardSelect.disabled = !selectedDistrictId;

          if (selectedDistrictId) {
            fetch(`/api/wards/${selectedDistrictId}`)
              .then((response) => response.json())
              .then((wards) => {
                wards.forEach((ward) => {
                  const option = document.createElement("option");
                  option.value = ward.id;
                  option.textContent = ward.name;
                  wardSelect.appendChild(option);
                });
              });
          }
          updateFullAddress();
        });

        wardSelect.addEventListener("change", updateFullAddress);
        specificAddressInput.addEventListener("input", updateFullAddress);

        function updateFullAddress() {
          const province =
            provinceSelect.options[provinceSelect.selectedIndex].text;
          const district =
            districtSelect.options[districtSelect.selectedIndex].text;
          const ward = wardSelect.options[wardSelect.selectedIndex].text;
          const specificAddress = specificAddressInput.value.trim();

          const addressParts = [
            specificAddress,
            ward,
            district,
            province
          ].filter(
            (part) =>
              part &&
              part !== "Chọn Xã/Phường" &&
              part !== "Chọn Quận/Huyện" &&
              part !== "Chọn Tỉnh/Thành phố"
          );
          fullAddressInput.value = addressParts.join(", ");
        }
      });

      // Form submission
      document
        .getElementById("registrationForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          if (password !== confirmPassword) {
            Toastify({
              text: "Mật khẩu và xác nhận mật khẩu không khớp!",
              duration: 3000,
              gravity: "top",
              position: "right",
              className: "toast-error",
              close: true
            }).showToast();
            return;
          }

          const formData = new FormData(this);

          try {
            const response = await fetch("/api/register", {
              method: "POST",
              body: formData,
              credentials: "include"
            });

            const data = await response.json();

            if (response.ok) {
              Toastify({
                text: "Đăng ký thành công! Vui lòng kiểm tra email để xác thực tài khoản.",
                duration: 3000,
                gravity: "top",
                position: "right",
                className: "toast-success",
                close: true
              }).showToast();

              setTimeout(() => {
                window.location.href = "/account/dangnhap.html";
              }, 3000);
            } else {
              Toastify({
                text: data.message || data.error || "Đăng ký thất bại",
                duration: 3000,
                gravity: "top",
                position: "right",
                className: "toast-error",
                close: true
              }).showToast();
            }
          } catch (error) {
            console.error("Error:", error);
            Toastify({
              text: "Đã xảy ra lỗi khi đăng ký",
              duration: 3000,
              gravity: "top",
              position: "right",
              className: "toast-error",
              close: true
            }).showToast();
          }
        });
    </script>
  </body>
</html>
