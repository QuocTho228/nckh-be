<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Lịch Sử Thu Mua - Thu Mua Viên</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Theme CSS -->
    <link rel="stylesheet" href="../shared/css/theme.css" />

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      [x-cloak] {
        display: none !important;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #028040;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-green-600 flex items-center justify-center"
            >
              <i class="fas fa-shopping-cart text-white"></i>
            </div>
            <span class="text-xl font-bold text-green-600">Thu Mua</span>
          </div>

          <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
            <a href="/purchaser/index.html" class="hover:text-green-600">
              <i class="fas fa-home"></i> Dashboard
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-semibold">Lịch sử thu mua</span>
          </div>

          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Purchaser&background=028040&color=fff"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <div class="text-left hidden md:block">
                <div id="userName" class="font-semibold text-sm">
                  Thu mua viên
                </div>
                <div id="userEmail" class="text-xs text-gray-500"></div>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>

            <div
              x-show="open"
              @click.away="open = false"
              x-transition
              x-cloak
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/purchaser/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <a
                href="/tieu-dung/trangcanhan.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-user mr-2"></i> Trang cá nhân
              </a>
              <button
                onclick="handleLogout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container mx-auto px-4 py-8"
      x-data="purchaseHistory()"
      x-init="init()"
    >
      <!-- Header -->
      <div class="mb-8">
        <h1
          class="text-3xl font-bold text-gray-900 mb-2 flex items-center gap-3"
        >
          <i class="fas fa-history text-blue-600"></i>
          Lịch Sử Thu Mua
        </h1>
        <p class="text-gray-600">Quản lý các giao dịch thu mua đã thực hiện</p>
      </div>

      <!-- Search -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <input
          type="text"
          x-model="searchQuery"
          @input="filterPurchases"
          placeholder="Tìm kiếm theo tên lô, SSCC, nông dân..."
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
        />
      </div>

      <!-- Loading -->
      <div x-show="loading" x-cloak class="flex justify-center py-12">
        <div class="spinner"></div>
      </div>

      <!-- Empty State -->
      <div
        x-show="!loading && filteredPurchases.length === 0 && searchQuery === ''"
        x-cloak
        class="text-center py-12 bg-white rounded-xl shadow-md"
      >
        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 mb-4">Chưa có giao dịch thu mua nào</p>
        <a
          href="/purchaser/danh-sach-lo-duyet.html"
          class="inline-block bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition"
        >
          <i class="fas fa-shopping-cart mr-2"></i> Bắt đầu thu mua
        </a>
      </div>

      <!-- No Results -->
      <div
        x-show="!loading && filteredPurchases.length === 0 && searchQuery !== ''"
        x-cloak
        class="text-center py-12 bg-white rounded-xl shadow-md"
      >
        <i class="fas fa-search text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-500">Không tìm thấy kết quả phù hợp</p>
      </div>

      <!-- Purchase List -->
      <div
        x-show="!loading && filteredPurchases.length > 0"
        x-cloak
        class="space-y-4"
      >
        <template
          x-for="(purchase, index) in filteredPurchases"
          :key="'purchase-' + index"
        >
          <div
            class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition"
          >
            <div class="flex items-start justify-between mb-4">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                  <h3
                    class="text-xl font-bold"
                    x-text="purchase.batch_name || 'N/A'"
                  ></h3>
                  <span
                    class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-semibold"
                    >Đã mua</span
                  >
                </div>
                <div class="text-sm text-gray-600 space-y-1">
                  <div>
                    <i class="fas fa-hashtag mr-2 text-gray-400"></i>
                    <span
                      >Mã GD: #<span
                        x-text="purchase.purchase_id || purchase.batch_id"
                      ></span
                    ></span>
                  </div>
                  <div x-show="purchase.purchase_date_iso">
                    <i class="fas fa-calendar mr-2 text-gray-400"></i>
                    <span
                      x-text="formatDateTime(purchase.purchase_date_iso)"
                    ></span>
                  </div>
                  <div x-show="purchase.sscc">
                    <i class="fas fa-barcode mr-2 text-gray-400"></i>
                    <span>SSCC: <span x-text="purchase.sscc"></span></span>
                  </div>
                </div>
              </div>
            </div>

            <div
              class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 bg-gray-50 rounded-lg"
            >
              <div>
                <p class="text-xs text-gray-500 mb-1">Nông dân</p>
                <p
                  class="font-semibold text-gray-900"
                  x-text="purchase.farmer_name || 'N/A'"
                ></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Số lượng</p>
                <p
                  class="font-semibold text-gray-900"
                  x-text="formatQuantity(purchase.total_quantity)"
                ></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Sản phẩm</p>
                <p
                  class="font-semibold text-gray-900"
                  x-text="purchase.product_name || 'N/A'"
                ></p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Chất lượng</p>
                <p
                  class="font-semibold"
                  :class="getQualityClass(purchase.quality_grade)"
                  x-text="purchase.quality_grade || 'Chưa đánh giá'"
                ></p>
              </div>
            </div>

            <template x-if="purchase.total_price">
              <div class="mt-4 pt-4 border-t flex justify-between items-center">
                <span class="text-gray-600">Tổng giá trị:</span>
                <span
                  class="text-2xl font-bold text-green-600"
                  x-text="formatPrice(purchase.total_price)"
                ></span>
              </div>
            </template>

            <template x-if="purchase.notes">
              <div class="mt-4 pt-4 border-t">
                <p class="text-sm text-gray-600 mb-1 font-semibold">Ghi chú:</p>
                <p class="text-sm text-gray-700" x-text="purchase.notes"></p>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Summary Stats -->
      <div
        x-show="!loading && purchases.length > 0"
        x-cloak
        class="mt-8 bg-white rounded-xl shadow-md p-6"
      >
        <h3 class="text-lg font-bold mb-4">Thống kê tổng quan</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="p-4 bg-blue-50 rounded-lg">
            <p class="text-sm text-blue-600 mb-1">Tổng số lô đã mua</p>
            <p
              class="text-2xl font-bold text-blue-700"
              x-text="purchases.length"
            ></p>
          </div>
          <div class="p-4 bg-green-50 rounded-lg">
            <p class="text-sm text-green-600 mb-1">Tổng số lượng</p>
            <p
              class="text-2xl font-bold text-green-700"
              x-text="calculateTotalQuantity()"
            ></p>
          </div>
          <div class="p-4 bg-purple-50 rounded-lg">
            <p class="text-sm text-purple-600 mb-1">Tổng giá trị</p>
            <p
              class="text-2xl font-bold text-purple-700"
              x-text="calculateTotalValue()"
            ></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script>
      function purchaseHistory() {
        return {
          purchases: [],
          filteredPurchases: [],
          loading: true,
          searchQuery: "",

          async init() {
            console.log("Initializing purchase history...");
            // Check auth (assuming you have Auth object from auth.js)
            if (typeof Auth !== "undefined" && Auth.requirePurchaser) {
              const isAuthorized = await Auth.requirePurchaser();
              if (!isAuthorized) return;
            }

            await this.loadPurchases();

            if (typeof Auth !== "undefined" && Auth.updateNavbar) {
              Auth.updateNavbar();
            }
          },

          async loadPurchases() {
            this.loading = true;
            try {
              console.log("Fetching purchases from API...");
              const response = await axios.get("/api/purchaser/my-purchases", {
                withCredentials: true,
              });

              console.log("API Response:", response.data);

              if (response.data && response.data.success) {
                // Handle nested data structure
                this.purchases = response.data.data || [];
                this.filteredPurchases = [...this.purchases];

                // Sort by date descending
                this.filteredPurchases.sort((a, b) => {
                  const dateA = new Date(
                    a.purchase_date_iso || a.production_date_iso || 0
                  );
                  const dateB = new Date(
                    b.purchase_date_iso || b.production_date_iso || 0
                  );
                  return dateB - dateA;
                });

                console.log("Loaded purchases:", this.purchases.length);
              } else {
                console.warn("Unexpected API response format:", response.data);
                this.purchases = [];
                this.filteredPurchases = [];
              }
            } catch (error) {
              console.error("Load purchases error:", error);
              if (typeof Swal !== "undefined") {
                Swal.fire({
                  icon: "error",
                  title: "Lỗi",
                  text:
                    "Không thể tải lịch sử thu mua: " +
                    (error.message || "Lỗi không xác định"),
                });
              } else {
                alert("Không thể tải lịch sử thu mua");
              }
              this.purchases = [];
              this.filteredPurchases = [];
            } finally {
              this.loading = false;
            }
          },

          filterPurchases() {
            if (!this.searchQuery.trim()) {
              this.filteredPurchases = [...this.purchases];
              return;
            }

            const query = this.searchQuery.toLowerCase();
            this.filteredPurchases = this.purchases.filter((p) => {
              return (
                (p.batch_name && p.batch_name.toLowerCase().includes(query)) ||
                (p.sscc && p.sscc.toLowerCase().includes(query)) ||
                (p.farmer_name &&
                  p.farmer_name.toLowerCase().includes(query)) ||
                (p.product_name && p.product_name.toLowerCase().includes(query))
              );
            });
          },

          formatDateTime(dateString) {
            if (!dateString) return "N/A";
            try {
              const date = new Date(dateString);
              return date.toLocaleString("vi-VN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
              });
            } catch (e) {
              return dateString;
            }
          },

          formatQuantity(qty) {
            if (!qty) return "N/A";
            return qty + " kg";
          },

          formatPrice(price) {
            if (!price) return "N/A";
            return new Intl.NumberFormat("vi-VN", {
              style: "currency",
              currency: "VND",
            }).format(price);
          },

          getQualityClass(grade) {
            if (!grade) return "text-gray-500";
            const gradeUpper = grade.toUpperCase();
            if (gradeUpper === "A" || gradeUpper === "A+")
              return "text-green-600";
            if (gradeUpper === "B") return "text-yellow-600";
            return "text-orange-600";
          },

          calculateTotalQuantity() {
            const total = this.purchases.reduce((sum, p) => {
              return sum + (parseFloat(p.total_quantity) || 0);
            }, 0);
            return total.toFixed(1) + " kg";
          },

          calculateTotalValue() {
            const total = this.purchases.reduce((sum, p) => {
              return sum + (parseFloat(p.total_price) || 0);
            }, 0);
            return this.formatPrice(total);
          },
        };
      }

      function handleLogout() {
        if (typeof Auth !== "undefined" && Auth.logout) {
          Auth.logout();
        } else {
          window.location.href = "/login.html";
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        if (typeof Auth !== "undefined" && Auth.init) {
          await Auth.init();
        }
      });
    </script>
  </body>
</html>
