<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Ghi Nhận Thu Mua - Thu Mua Viên</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Theme CSS -->
    <link rel="stylesheet" href="../shared/css/theme.css" />

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
            >
              <i class="fas fa-shopping-cart text-white"></i>
            </div>
            <span
              class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
            >
              Thu Mua
            </span>
          </div>

          <!-- Breadcrumb -->
          <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
            <a href="/purchaser/index.html" class="hover:text-green-600">
              <i class="fas fa-home"></i> Dashboard
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <a
              href="/purchaser/danh-sach-lo-duyet.html"
              class="hover:text-green-600"
            >
              Lô đã duyệt
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-semibold">Ghi nhận mua</span>
          </div>

          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Purchaser&background=028040&color=fff"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <div class="text-left hidden md:block">
                <div id="userName" class="font-semibold text-sm">
                  Thu mua viên
                </div>
                <div id="userEmail" class="text-xs text-gray-500"></div>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>

            <div
              x-show="open"
              @click.away="open = false"
              x-transition
              x-cloak
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/purchaser/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <a
                href="/tieu-dung/trangcanhan.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-user mr-2"></i> Trang cá nhân
              </a>
              <button
                onclick="Auth.logout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container mx-auto px-4 py-8"
      x-data="purchaseForm()"
      x-init="init()"
    >
      <!-- Loading -->
      <div x-show="loading" x-cloak class="flex justify-center py-12">
        <div class="spinner"></div>
      </div>

      <!-- Error State -->
      <div x-show="error && !loading" x-cloak class="text-center py-12">
        <i class="fas fa-exclamation-circle text-6xl text-red-500 mb-4"></i>
        <p class="text-gray-700 mb-4" x-text="error"></p>
        <a href="/purchaser/danh-sach-lo-duyet.html" class="btn-primary">
          <i class="fas fa-arrow-left mr-2"></i> Quay lại danh sách
        </a>
      </div>

      <!-- Content -->
      <template x-if="!loading && !error && batchData">
        <div>
          <!-- Header -->
          <div
            class="bg-gradient-primary rounded-xl shadow-lg p-6 text-white mb-8"
          >
            <div class="flex items-start justify-between">
              <div>
                <h1
                  class="text-3xl font-bold mb-2"
                  x-text="batchData.batch.batch_name"
                ></h1>
                <div class="flex flex-wrap gap-3 text-sm opacity-90">
                  <div>
                    <i class="fas fa-barcode mr-2"></i>
                    <span>SSCC: </span>
                    <button
                      @click="Utils.copyToClipboard(batchData.batch.sscc)"
                      class="font-mono hover:underline"
                      x-text="batchData.batch.sscc"
                    ></button>
                  </div>
                  <div>
                    <i class="fas fa-box mr-2"></i>
                    <span
                      x-text="'Số lượng: ' + batchData.batch.quantity + ' kg'"
                    ></span>
                  </div>
                </div>
              </div>

              <span class="badge bg-white text-green-600 text-lg px-4 py-2">
                Sẵn sàng mua
              </span>
            </div>
          </div>

          <!-- Warning if already purchased -->
          <template x-if="batchData.alreadyPurchased">
            <div
              class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-8 rounded"
            >
              <div class="flex items-start">
                <i
                  class="fas fa-exclamation-triangle text-yellow-400 text-xl mr-3 mt-1"
                ></i>
                <div>
                  <h3 class="font-bold text-yellow-800 mb-1">Cảnh báo</h3>
                  <p class="text-sm text-yellow-700">
                    Lô hàng này đã được mua vào ngày
                    <strong
                      x-text="Utils.formatDate(batchData.purchaseInfo?.purchase_date)"
                    ></strong
                    >. Bạn không thể mua lại.
                  </p>
                </div>
              </div>
            </div>
          </template>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Batch Info -->
            <div class="lg:col-span-2 space-y-6">
              <!-- Thông tin nông dân -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-user text-green-600"></i>
                  Thông tin nông dân
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                  <div>
                    <p class="text-gray-600 mb-1">Họ tên</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.farmer_name || 'N/A'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Số điện thoại</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.farmer_phone || 'N/A'"
                    ></p>
                  </div>
                  <div class="col-span-2">
                    <p class="text-gray-600 mb-1">Địa chỉ</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.farmer_address || 'N/A'"
                    ></p>
                  </div>
                </div>
              </div>

              <!-- Thông tin lô hàng -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-info-circle text-green-600"></i>
                  Thông tin lô hàng
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                  <div>
                    <p class="text-gray-600 mb-1">Sản phẩm</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.product_name || 'N/A'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Số lượng</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.quantity + ' kg'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Thửa đất</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batchData.batch.farm_plot_number || 'N/A'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Ngày thu hoạch</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="Utils.formatDate(batchData.batch.start_date_iso) + ' - ' + Utils.formatDate(batchData.batch.end_date_iso)"
                    ></p>
                  </div>
                </div>
              </div>

              <!-- Ảnh sản phẩm -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-images text-green-600"></i>
                  Ảnh sản phẩm
                </h2>
                <div
                  x-show="batchData.images.length === 0"
                  class="text-center py-4 text-gray-500"
                >
                  Chưa có ảnh
                </div>
                <div
                  x-show="batchData.images.length > 0"
                  class="grid grid-cols-2 md:grid-cols-3 gap-3"
                >
                  <template x-for="image in batchData.images" :key="image">
                    <img
                      :src="image"
                      alt="Ảnh sản phẩm"
                      class="w-full h-32 object-cover rounded-lg cursor-pointer hover:opacity-75 transition"
                      @click="viewImage(image)"
                    />
                  </template>
                </div>
              </div>

              <!-- Purchase Form -->
              <template x-if="!batchData.alreadyPurchased">
                <form
                  @submit.prevent="submitPurchase()"
                  class="bg-white rounded-xl shadow-md p-6"
                >
                  <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-edit text-blue-600"></i>
                    Thông tin thu mua
                  </h2>

                  <div class="space-y-6">
                    <!-- Số lượng mua -->
                    <div>
                      <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                      >
                        Số lượng mua (kg) <span class="text-red-500">*</span>
                      </label>
                      <input
                        type="number"
                        x-model="formData.quantityKg"
                        :max="batchData.batch.quantity"
                        min="0.01"
                        step="0.01"
                        required
                        class="input-gradient"
                        placeholder="Nhập số kg"
                      />
                      <p class="text-xs text-gray-500 mt-1">
                        Tối đa:
                        <span x-text="batchData.batch.quantity"></span> kg
                      </p>
                    </div>

                    <!-- Đơn giá -->
                    <div>
                      <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                      >
                        Đơn giá (VNĐ/kg) <span class="text-red-500">*</span>
                      </label>
                      <input
                        type="number"
                        x-model="formData.pricePerKg"
                        min="1000"
                        step="1000"
                        required
                        class="input-gradient"
                        placeholder="Nhập đơn giá"
                      />
                    </div>

                    <!-- Chất lượng -->
                    <div>
                      <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                      >
                        Chất lượng hàng
                      </label>
                      <select
                        x-model="formData.qualityGrade"
                        class="input-gradient"
                      >
                        <option value="">-- Chọn chất lượng --</option>
                        <option value="A">Loại A - Xuất sắc</option>
                        <option value="B">Loại B - Tốt</option>
                        <option value="C">Loại C - Trung bình</option>
                        <option value="D">Loại D - Thấp</option>
                      </select>
                    </div>

                    <!-- Tổng tiền -->
                    <div class="bg-green-50 rounded-lg p-4">
                      <p class="text-sm text-gray-600 mb-1">Tổng giá trị</p>
                      <p class="text-3xl font-bold text-green-600">
                        <span x-text="Utils.formatNumber(totalPrice)"></span>
                        VNĐ
                      </p>
                    </div>

                    <!-- Ghi chú -->
                    <div>
                      <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                      >
                        Ghi chú
                      </label>
                      <textarea
                        x-model="formData.notes"
                        rows="3"
                        class="input-gradient"
                        placeholder="Thêm ghi chú về giao dịch..."
                      ></textarea>
                    </div>

                    <!-- Upload ảnh -->
                    <div>
                      <label
                        class="block text-sm font-semibold text-gray-700 mb-2"
                      >
                        Ảnh minh chứng (tối đa 5 ảnh)
                      </label>
                      <input
                        type="file"
                        id="purchaseImages"
                        accept="image/*"
                        multiple
                        max="5"
                        @change="handleImages($event)"
                        class="input-gradient"
                      />
                      <p class="text-xs text-gray-500 mt-1">
                        <i class="fas fa-camera mr-1"></i>
                        JPEG, PNG, WebP - Tối đa 10MB/ảnh
                      </p>
                      <div
                        id="imagePreview"
                        class="grid grid-cols-3 md:grid-cols-5 gap-2 mt-3"
                      ></div>
                    </div>

                    <!-- Submit -->
                    <div class="flex gap-3 pt-4 border-t">
                      <a
                        href="/purchaser/danh-sach-lo-duyet.html"
                        class="btn-secondary flex-1 text-center"
                      >
                        <i class="fas fa-times mr-2"></i> Hủy
                      </a>
                      <button
                        type="submit"
                        class="btn-primary flex-1"
                        :disabled="submitting"
                      >
                        <template x-if="!submitting">
                          <span
                            ><i class="fas fa-check mr-2"></i> Xác nhận
                            mua</span
                          >
                        </template>
                        <template x-if="submitting">
                          <span
                            ><i class="fas fa-spinner fa-spin mr-2"></i> Đang xử
                            lý...</span
                          >
                        </template>
                      </button>
                    </div>
                  </div>
                </form>
              </template>
            </div>

            <!-- Right: Additional Info -->
            <div class="space-y-6">
              <!-- Certificate -->
              <template x-if="batchData.certificateImage">
                <div class="bg-white rounded-xl shadow-md p-6">
                  <h3 class="font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-certificate text-yellow-500"></i>
                    Chứng nhận
                  </h3>
                  <img
                    :src="batchData.certificateImage"
                    alt="Chứng nhận"
                    class="w-full rounded-lg cursor-pointer hover:opacity-75 transition"
                    @click="viewImage(batchData.certificateImage)"
                  />
                </div>
              </template>

              <!-- Source Trees -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-tree text-green-600"></i>
                  Cây nguồn gốc
                  <span
                    class="badge badge-success ml-2"
                    x-text="batchData.sourceTrees.length + ' cây'"
                  ></span>
                </h3>
                <div class="space-y-2 max-h-64 overflow-y-auto">
                  <template
                    x-for="tree in batchData.sourceTrees"
                    :key="tree.tree_id"
                  >
                    <div class="border rounded p-2 text-sm">
                      <p class="font-semibold" x-text="tree.tree_qr_code"></p>
                      <p
                        class="text-xs text-gray-600"
                        x-text="tree.tree_type + ' - ' + tree.variety"
                      ></p>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="js/purchase-form.js"></script>
  </body>
</html>
