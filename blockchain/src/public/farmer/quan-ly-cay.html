<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../hinhanh/favicon.png" />
    <title>Quản Lý Cây Trồng - Nông Dân</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Theme CSS -->
    <link rel="stylesheet" href="../shared/css/theme.css" />

    <!-- Alpine.js cloak style -->
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ✅ jsQR Library for QR Code Detection -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
            >
              <i class="fas fa-leaf text-white"></i>
            </div>
            <span
              class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
            >
              Nông Trại
            </span>
          </div>

          <!-- Breadcrumb -->
          <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
            <a href="/farmer/index.html" class="hover:text-green-600">
              <i class="fas fa-home"></i> Dashboard
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-semibold">Quản lý cây trồng</span>
          </div>

          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Farmer"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <div class="text-left hidden md:block">
                <div id="userName" class="font-semibold text-sm">Nông dân</div>
                <div id="userEmail" class="text-xs text-gray-500"></div>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>

            <div
              x-show="open"
              x-cloak
              @click.away="open = false"
              x-transition
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/farmer/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <a
                href="/tieu-dung/trangcanhan.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-user mr-2"></i> Trang cá nhân
              </a>
              <button
                onclick="Auth.logout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container mx-auto px-4 py-8"
      x-data="treeManager()"
      x-init="init()"
    >
      <!-- Header -->
      <div
        class="flex flex-col md:flex-row md:items-center md:justify-between mb-8"
      >
        <div>
          <h1
            class="text-3xl font-bold text-gray-900 mb-2 flex items-center gap-3"
          >
            <i class="fas fa-tree text-green-600"></i>
            Quản Lý Cây Trồng
          </h1>
          <p class="text-gray-600">Quản lý và theo dõi cây trồng của bạn</p>
        </div>

        <div class="flex gap-3 mt-4 md:mt-0">
          <button @click="openAddTreeModal()" class="btn-primary">
            <i class="fas fa-plus mr-2"></i> Đăng ký cây mới
          </button>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm mb-1">Tổng số cây</p>
              <p
                class="text-3xl font-bold text-gray-900"
                x-text="stats.total"
              ></p>
            </div>
            <div
              class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center"
            >
              <i class="fas fa-tree text-xl text-green-600"></i>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm mb-1">Đang hoạt động</p>
              <p
                class="text-3xl font-bold text-green-600"
                x-text="stats.active"
              ></p>
            </div>
            <div
              class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center"
            >
              <i class="fas fa-seedling text-xl text-green-600"></i>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm mb-1">Đã thu hoạch</p>
              <p
                class="text-3xl font-bold text-gray-600"
                x-text="stats.harvested"
              ></p>
            </div>
            <div
              class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center"
            >
              <i class="fas fa-check-circle text-xl text-gray-600"></i>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm mb-1">Đã chọn</p>
              <p
                class="text-3xl font-bold text-blue-600"
                x-text="selectedTrees.length"
              ></p>
            </div>
            <div
              class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center"
            >
              <i class="fas fa-check-square text-xl text-blue-600"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- ✅ NEW: Selection Actions Bar -->
      <div
        x-show="selectedTrees.length > 0"
        x-cloak
        x-transition
        class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-8"
      >
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold"
            >
              <span x-text="selectedTrees.length"></span>
            </div>
            <div>
              <p class="font-semibold text-blue-900">
                <span x-text="selectedTrees.length"></span> cây đã chọn
              </p>
              <p class="text-sm text-blue-700">Sẵn sàng ghi nhật ký chăm sóc</p>
            </div>
          </div>

          <div class="flex gap-2">
            <button
              @click="deselectAllTrees()"
              class="btn-secondary text-sm py-2 px-4"
            >
              <i class="fas fa-times mr-2"></i>
              Bỏ chọn tất cả
            </button>
            <button
              @click="openAddCareModal()"
              class="btn-primary text-sm py-2 px-4"
            >
              <i class="fas fa-heart mr-2"></i>
              Ghi nhật ký chăm sóc
            </button>
          </div>
        </div>
      </div>

      <!-- Filter & Search -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Tìm kiếm</label
            >
            <input
              type="text"
              x-model="searchQuery"
              placeholder="QR Code, loại cây, giống..."
              class="input-gradient"
            />
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Trạng thái</label
            >
            <select x-model="filterStatus" class="input-gradient">
              <option value="all">Tất cả</option>
              <option value="active">Đang hoạt động</option>
              <option value="harvested">Đã thu hoạch</option>
            </select>
          </div>

          <div class="flex items-end gap-2">
            <button @click="clearFilters()" class="btn-secondary flex-1">
              <i class="fas fa-filter-circle-xmark mr-2"></i> Xóa bộ lọc
            </button>
            <button @click="loadTrees()" class="btn-primary flex-1">
              <i class="fas fa-sync mr-2"></i> Làm mới
            </button>
          </div>
        </div>

        <!-- ✅ NEW: Batch Selection Actions -->
        <div class="border-t border-gray-200 pt-4">
          <p class="text-sm font-semibold text-gray-700 mb-3">
            <i class="fas fa-hand-pointer mr-2"></i>
            Chọn cây hàng loạt:
          </p>
          <div class="flex flex-wrap gap-2">
            <button
              @click="openQRScanner()"
              class="btn-primary text-sm py-2 px-4"
            >
              <i class="fas fa-qrcode mr-2"></i>
              Quét mã QR
            </button>
            <button
              @click="selectAllActiveTrees()"
              class="btn-secondary text-sm py-2 px-4"
            >
              <i class="fas fa-check-double mr-2"></i>
              Chọn tất cả cây đang hoạt động
            </button>
            <button
              @click="deselectAllTrees()"
              class="btn-secondary text-sm py-2 px-4"
              :disabled="selectedTrees.length === 0"
            >
              <i class="fas fa-times mr-2"></i>
              Bỏ chọn tất cả
            </button>
          </div>
        </div>
      </div>

      <!-- Loading -->
      <div x-show="loading" x-cloak class="flex justify-center py-12">
        <div class="spinner"></div>
      </div>

      <!-- Empty State -->
      <div
        x-show="!loading && filteredTrees.length === 0"
        x-cloak
        class="text-center py-12"
      >
        <i class="fas fa-seedling text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 mb-4">Chưa có cây trồng nào</p>
        <button @click="openAddTreeModal()" class="btn-primary">
          <i class="fas fa-plus mr-2"></i> Đăng ký cây đầu tiên
        </button>
      </div>

      <!-- Trees Grid -->
      <div
        x-show="!loading && filteredTrees.length > 0"
        x-cloak
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <template x-for="tree in filteredTrees" :key="tree.tree_id">
          <div
            class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition"
            :class="selectedTrees.includes(tree.tree_id) ? 'ring-2 ring-blue-500' : ''"
          >
            <!-- Tree Card Header -->
            <div class="bg-gradient-primary p-4 text-white">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                  <input
                    type="checkbox"
                    :value="tree.tree_id"
                    @change="toggleTreeSelection(tree.tree_id)"
                    :checked="selectedTrees.includes(tree.tree_id)"
                    class="w-5 h-5 rounded"
                    :disabled="!tree.is_active"
                  />
                  <span
                    class="font-bold text-sm"
                    x-text="tree.tree_qr_code"
                  ></span>
                </div>
                <span
                  :class="tree.is_active ? 'badge-success' : 'badge'"
                  class="badge text-xs"
                  x-text="tree.is_active ? 'Hoạt động' : 'Đã thu hoạch'"
                ></span>
              </div>
              <div class="flex items-center gap-2">
                <i class="fas fa-tree"></i>
                <span class="font-semibold" x-text="tree.tree_type"></span>
              </div>
            </div>

            <!-- Tree Card Body -->
            <div class="p-4">
              <div class="flex items-center gap-6">
                <!-- Bên trái: Thông tin chữ -->
                <div class="flex-1 space-y-3 text-sm min-w-0">
                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-dna w-4"></i>
                    <span>Giống: <strong x-text="tree.variety"></strong></span>
                  </div>

                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-calendar w-4"></i>
                    <span>
                      Trồng:
                      <strong
                        x-text="Utils.formatDate(tree.planted_date_iso)"
                      ></strong>
                    </span>
                  </div>

                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-map-marker-alt w-4"></i>
                    <span
                      class="truncate"
                      :title="tree.coordinates"
                      x-text="tree.coordinates || 'N/A'"
                    ></span>
                  </div>

                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-clock w-4"></i>
                    <span x-text="getTreeAge(tree.planted_date_iso)"></span>
                  </div>
                </div>

                <!-- Bên phải: QR Code -->
                <template x-if="tree.qr_image_url">
                  <div class="flex-shrink-0">
                    <div
                      class="relative group cursor-pointer"
                      @click="viewQRCode(tree)"
                    >
                      <img
                        :src="tree.qr_image_url"
                        :alt="'QR Code ' + tree.tree_qr_code"
                        class="w-28 h-28 sm:w-32 sm:h-32 border-2 border-gray-200 rounded-lg hover:border-green-500 transition"
                      />
                      <div
                        class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 flex items-center justify-center rounded-lg transition"
                      >
                        <i
                          class="fas fa-search-plus text-white text-xl opacity-0 group-hover:opacity-100"
                        ></i>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Actions -->
              <div class="flex gap-2 mt-6 pt-4 border-t border-gray-200">
                <button
                  @click="viewTreeDetails(tree)"
                  class="btn-secondary flex-1 text-sm py-2"
                >
                  <i class="fas fa-eye mr-1"></i> Chi tiết
                </button>
                <button
                  @click="quickAddCare(tree)"
                  class="btn-primary flex-1 text-sm py-2"
                  :disabled="!tree.is_active"
                >
                  <i class="fas fa-heart mr-1"></i> Chăm sóc
                </button>
              </div>

              <!-- Quick actions QR -->
              <template x-if="tree.qr_image_url">
                <div class="flex gap-2 mt-3">
                  <button
                    @click.stop="downloadQRCode(tree)"
                    class="flex-1 text-xs py-2 px-3 bg-gray-100 hover:bg-gray-200 rounded-lg transition flex items-center justify-center gap-1"
                  >
                    <i class="fas fa-download"></i>
                    <span>Tải QR</span>
                  </button>
                  <button
                    @click.stop="copyQRCode(tree)"
                    class="flex-1 text-xs py-2 px-3 bg-gray-100 hover:bg-gray-200 rounded-lg transition flex items-center justify-center gap-1"
                  >
                    <i class="fas fa-copy"></i>
                    <span>Sao chép</span>
                  </button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Pagination -->
      <div
        x-show="!loading && filteredTrees.length > 0"
        x-cloak
        class="mt-8 flex justify-center"
      >
        <div class="text-gray-600">
          Hiển thị <strong x-text="filteredTrees.length"></strong> cây
        </div>
      </div>

      <!-- Modal: Đăng ký cây mới -->
      <template x-if="showAddTreeModal">
        <div
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
          @click.self="closeAddTreeModal()"
        >
          <div
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 transform scale-95"
            x-transition:enter-end="opacity-100 transform scale-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 transform scale-100"
            x-transition:leave-end="opacity-0 transform scale-95"
            class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto"
            @click.stop
          >
            <div
              class="sticky top-0 bg-white border-b border-gray-200 p-6 flex items-center justify-between z-10"
            >
              <h2 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-seedling text-green-600"></i>
                Đăng ký cây mới
              </h2>
              <button
                @click="closeAddTreeModal()"
                type="button"
                class="text-gray-400 hover:text-gray-600 transition"
              >
                <i class="fas fa-times text-2xl"></i>
              </button>
            </div>

            <div id="addTreeFormContainer" class="p-6"></div>
          </div>
        </div>
      </template>

      <!-- Modal: Ghi nhật ký chăm sóc -->
      <template x-if="showAddCareModal">
        <div
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
          @click.self="closeAddCareModal()"
        >
          <div
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 transform scale-95"
            x-transition:enter-end="opacity-100 transform scale-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 transform scale-100"
            x-transition:leave-end="opacity-0 transform scale-95"
            class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto"
            @click.stop
          >
            <div
              class="sticky top-0 bg-white border-b border-gray-200 p-6 flex items-center justify-between z-10"
            >
              <h2 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-heart text-red-500"></i>
                Ghi nhật ký chăm sóc
                <span
                  x-show="selectedTrees.length > 0"
                  x-cloak
                  class="badge badge-success ml-2"
                  x-text="selectedTrees.length + ' cây'"
                ></span>
              </h2>
              <button
                @click="closeAddCareModal()"
                type="button"
                class="text-gray-400 hover:text-gray-600 transition"
              >
                <i class="fas fa-times text-2xl"></i>
              </button>
            </div>

            <div id="addCareFormContainer" class="p-6"></div>
          </div>
        </div>
      </template>

      <!-- Modal: Chi tiết cây -->
      <template x-if="showTreeDetailModal">
        <div
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
          @click.self="closeTreeDetailModal()"
        >
          <div
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 transform scale-95"
            x-transition:enter-end="opacity-100 transform scale-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 transform scale-100"
            x-transition:leave-end="opacity-0 transform scale-95"
            class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto"
            @click.stop
          >
            <div
              class="sticky top-0 bg-white border-b border-gray-200 p-6 flex items-center justify-between z-10"
            >
              <h2 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-tree text-green-600"></i>
                Chi tiết cây trồng
              </h2>
              <button
                @click="closeTreeDetailModal()"
                type="button"
                class="text-gray-400 hover:text-gray-600 transition"
              >
                <i class="fas fa-times text-2xl"></i>
              </button>
            </div>

            <div id="treeDetailContainer" class="p-6"></div>
          </div>
        </div>
      </template>

      <!-- Durian AI Section -->
      <section class="mt-6">
        <h3 class="text-lg font-bold text-gray-800 mb-3"></h3>
        <div data-durian-ai data-durian-compact></div>
      </section>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="js/tree-form.js"></script>
    <script src="js/qr-scanner.js"></script>
    <script src="js/tree-manager.js"></script>
    <script src="../shared/js/durian-ai.js"></script>
  </body>
</html>
