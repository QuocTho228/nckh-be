<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Lô Hàng - Nông Dân</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Theme CSS -->
    <link rel="stylesheet" href="../shared/css/theme.css" />

    <!-- Alpine.js cloak -->
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-gradient-bg min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center"
            >
              <i class="fas fa-leaf text-white"></i>
            </div>
            <span
              class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent"
            >
              Nông Trại
            </span>
          </div>

          <!-- Breadcrumb -->
          <div class="hidden md:flex items-center gap-2 text-sm text-gray-600">
            <a href="/farmer/index.html" class="hover:text-green-600">
              <i class="fas fa-home"></i> Dashboard
            </a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-gray-900 font-semibold">Chi tiết lô hàng</span>
          </div>

          <div x-data="{ open: false }" class="relative">
            <button
              @click="open = !open"
              class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-3 py-2 transition"
            >
              <img
                id="userAvatar"
                src="https://ui-avatars.com/api/?name=Farmer"
                alt="Avatar"
                class="w-10 h-10 rounded-full"
              />
              <div class="text-left hidden md:block">
                <div id="userName" class="font-semibold text-sm">Nông dân</div>
                <div id="userEmail" class="text-xs text-gray-500"></div>
              </div>
              <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
            </button>

            <div
              x-show="open"
              x-cloak
              @click.away="open = false"
              x-transition
              class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2"
            >
              <a
                href="/farmer/index.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-home mr-2"></i> Dashboard
              </a>
              <a
                href="/tieu-dung/trangcanhan.html"
                class="block px-4 py-2 hover:bg-gray-50 text-sm"
              >
                <i class="fas fa-user mr-2"></i> Trang cá nhân
              </a>
              <button
                onclick="Auth.logout()"
                class="w-full text-left px-4 py-2 hover:bg-gray-50 text-sm text-red-600"
              >
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container mx-auto px-4 py-8"
      x-data="batchDetail()"
      x-init="init()"
    >
      <!-- Loading -->
      <div x-show="loading" x-cloak class="flex justify-center py-12">
        <div class="spinner"></div>
      </div>

      <!-- Error State -->
      <div x-show="error && !loading" x-cloak class="text-center py-12">
        <i class="fas fa-exclamation-circle text-6xl text-red-500 mb-4"></i>
        <p class="text-gray-700 mb-4" x-text="error"></p>
        <a href="/farmer/index.html" class="btn-primary">
          <i class="fas fa-home mr-2"></i> Về Dashboard
        </a>
      </div>

      <!-- ✅ FIX: Dùng x-if thay vì x-show -->
      <template x-if="!loading && !error && batch">
        <div>
          <!-- Header -->
          <div
            class="bg-gradient-primary rounded-xl shadow-lg p-6 text-white mb-8"
          >
            <div
              class="flex flex-col md:flex-row md:items-center md:justify-between"
            >
              <div>
                <h1
                  class="text-3xl font-bold mb-2"
                  x-text="batch.batch_name"
                ></h1>
                <div class="flex flex-wrap gap-3 text-sm opacity-90">
                  <div>
                    <i class="fas fa-barcode mr-2"></i>
                    <span>SSCC: </span>
                    <button
                      @click="Utils.copyToClipboard(batch.sscc)"
                      class="font-mono hover:underline"
                      x-text="batch.sscc"
                    ></button>
                  </div>
                  <div>
                    <i class="fas fa-calendar mr-2"></i>
                    <span
                      x-text="Utils.formatDate(batch.production_date_iso)"
                    ></span>
                  </div>
                  <div>
                    <i class="fas fa-box mr-2"></i>
                    <span x-text="batch.quantity + ' kg'"></span>
                  </div>
                </div>
              </div>

              <div class="mt-4 md:mt-0">
                <span
                  :class="Utils.getStatusBadge(batch.status)"
                  class="badge text-lg px-4 py-2"
                  x-text="Utils.getStatusText(batch.status)"
                ></span>
              </div>
            </div>
          </div>

          <!-- Grid Info -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <!-- Left Column: Info -->
            <div class="lg:col-span-2 space-y-6">
              <!-- Thông tin cơ bản -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-info-circle text-green-600"></i>
                  Thông tin cơ bản
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                  <div>
                    <p class="text-gray-600 mb-1">Loại sản phẩm</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batch.product_name || 'N/A'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Thửa đất</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batch.farm_plot_number || 'N/A'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Ngày bắt đầu</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="Utils.formatDate(batch.start_date_iso)"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Ngày kết thúc</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="Utils.formatDate(batch.end_date_iso)"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Giai đoạn hiện tại</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batch.current_stage || 'Created'"
                    ></p>
                  </div>
                  <div>
                    <p class="text-gray-600 mb-1">Tổng sản phẩm</p>
                    <p
                      class="font-semibold text-gray-900"
                      x-text="batch.total_products || 0"
                    ></p>
                  </div>
                </div>
              </div>

              <!-- Cây nguồn gốc -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-tree text-green-600"></i>
                  Cây nguồn gốc (<span x-text="sourceTrees.length"></span> cây)
                </h2>

                <div
                  x-show="loadingTrees"
                  x-cloak
                  class="flex justify-center py-4"
                >
                  <div class="spinner"></div>
                </div>

                <div
                  x-show="!loadingTrees"
                  x-cloak
                  class="grid grid-cols-1 md:grid-cols-2 gap-3"
                >
                  <template x-for="tree in sourceTrees" :key="tree.tree_id">
                    <div
                      class="border rounded-lg p-3 hover:bg-gray-50 transition"
                    >
                      <div
                        class="font-bold text-gray-900 mb-1"
                        x-text="tree.tree_qr_code"
                      ></div>
                      <div
                        class="text-sm text-gray-600"
                        x-text="tree.tree_type + ' - ' + tree.variety"
                      ></div>
                      <div class="text-xs text-gray-500 mt-1">
                        <i class="fas fa-calendar mr-1"></i>
                        <span
                          x-text="Utils.formatDate(tree.planted_date_iso)"
                        ></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Ảnh sản phẩm -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-images text-green-600"></i>
                  Ảnh sản phẩm
                </h2>

                <div
                  x-show="images.length === 0"
                  x-cloak
                  class="text-center py-4 text-gray-500"
                >
                  Chưa có ảnh
                </div>

                <div
                  x-show="images.length > 0"
                  x-cloak
                  class="grid grid-cols-2 md:grid-cols-3 gap-3"
                >
                  <template x-for="image in images" :key="image">
                    <img
                      :src="image"
                      alt="Ảnh sản phẩm"
                      class="w-full h-32 object-cover rounded-lg cursor-pointer hover:opacity-75 transition"
                      @click="viewImage(image)"
                    />
                  </template>
                </div>
              </div>
            </div>

            <!-- Right Column: Timeline & Actions -->
            <div class="space-y-6">
              <!-- Actions -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="font-bold mb-4">Thao tác</h3>
                <div class="space-y-3">
                  <a
                    href="/farmer/index.html"
                    class="btn-secondary w-full text-center"
                  >
                    <i class="fas fa-arrow-left mr-2"></i> Quay lại
                  </a>
                  <button @click="viewPublicPage()" class="btn-primary w-full">
                    <i class="fas fa-eye mr-2"></i> Xem trang công khai
                  </button>
                </div>
              </div>

              <!-- Timeline -->
              <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-clock text-green-600"></i>
                  Timeline
                </h3>

                <div class="space-y-4">
                  <template x-for="(event, index) in timeline" :key="index">
                    <div class="flex gap-3">
                      <div class="flex flex-col items-center">
                        <div
                          class="w-8 h-8 rounded-full flex items-center justify-center"
                          :class="event.completed ? 'bg-green-500' : 'bg-gray-300'"
                        >
                          <i :class="event.icon" class="text-white text-xs"></i>
                        </div>
                        <div
                          x-show="index < timeline.length - 1"
                          class="w-0.5 h-full my-1"
                          :class="event.completed ? 'bg-green-500' : 'bg-gray-300'"
                        ></div>
                      </div>

                      <div class="flex-1 pb-4">
                        <p
                          class="font-semibold text-sm"
                          :class="event.completed ? 'text-gray-900' : 'text-gray-400'"
                          x-text="event.title"
                        ></p>
                        <p
                          class="text-xs"
                          :class="event.completed ? 'text-gray-600' : 'text-gray-400'"
                          x-text="event.description"
                        ></p>
                        <p
                          x-show="event.date"
                          class="text-xs text-gray-500 mt-1"
                          x-text="Utils.formatDateTime(event.date)"
                        ></p>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Certificate -->
              <template x-if="batch.certificate_image_url">
                <div class="bg-white rounded-xl shadow-md p-6">
                  <h3 class="font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-certificate text-yellow-500"></i>
                    Chứng nhận
                  </h3>
                  <img
                    :src="batch.certificate_image_url"
                    alt="Chứng nhận"
                    class="w-full rounded-lg cursor-pointer hover:opacity-75 transition"
                    @click="viewImage(batch.certificate_image_url)"
                  />
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/api.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="js/batch-detail.js"></script>
  </body>
</html>
